openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Gestor de Facturas Finca
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: invoices
    description: Invoice management operations
  - name: notifications
    description: Notification operations
  - name: ocr
    description: OCR and AI extraction operations
  - name: audit
    description: Audit log and governance operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Global search across supplier, invoice number, description, notes and items
        - name: category
          in: query
          schema:
            type: string
        - name: supplier
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create a new invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [invoices]
      summary: List all suppliers with aggregated stats
      responses:
        "200":
          description: List of supplier stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierStats"

  /invoices/summary:
    get:
      operationId: getInvoiceSummary
      tags: [invoices]
      summary: Get summary statistics for invoices
      responses:
        "200":
          description: Invoice summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceSummary"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List recent notifications
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppNotification"

  /invoices/export:
    get:
      operationId: exportInvoices
      tags: [invoices]
      summary: Export invoices as Excel file
      responses:
        "200":
          description: Excel file as base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get a single invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /invoices/{id}/items:
    get:
      operationId: listInvoiceItems
      tags: [invoices]
      summary: List items for a specific invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of invoice items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceItem"

  /invoices/check-duplicate:
    post:
      operationId: checkInvoiceDuplicate
      tags: [invoices]
      summary: Check whether an invoice being prepared duplicates an existing one
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckDuplicateBody"
      responses:
        "200":
          description: Duplicate match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckDuplicateResult"

  /ocr/extract:
    post:
      operationId: extractInvoiceData
      tags: [ocr]
      summary: Extract invoice data from image using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractInvoiceBody"
      responses:
        "200":
          description: Extracted invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedInvoiceData"

  /ocr/validate:
    post:
      operationId: validateInvoiceData
      tags: [ocr]
      summary: Validate and normalize invoice data using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateInvoiceBody"
      responses:
        "200":
          description: Validated and corrected invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedInvoiceData"

  /me/role:
    get:
      operationId: getMyRole
      tags: [audit]
      summary: Get current user's role flags
      responses:
        "200":
          description: Role info for the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRole"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit log entries
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: action
          in: query
          schema: { type: string }
        - name: entityType
          in: query
          schema: { type: string }
        - name: entityId
          in: query
          schema: { type: integer }
        - name: userId
          in: query
          schema: { type: string }
        - name: startDate
          in: query
          schema: { type: string }
        - name: endDate
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /audit-logs/stats:
    get:
      operationId: getAuditLogStats
      tags: [audit]
      summary: Aggregated audit statistics
      responses:
        "200":
          description: Audit statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditStats"

  /audit-logs/export:
    get:
      operationId: exportAuditLogs
      tags: [audit]
      summary: Export audit logs to Excel
      responses:
        "200":
          description: Excel file as base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: ["string", "null"]
        supplier:
          type: string
        date:
          type: ["string", "null"]
        category:
          type: string
        totalAmount:
          type: ["number", "null"]
        imageBase64:
          type: ["string", "null"]
        imageHash:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        buyer:
          type: ["string", "null"]
        createdBy:
          type: ["string", "null"]
        updatedBy:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
      required:
        - id
        - supplier
        - category
        - createdAt
        - items

    InvoiceItem:
      type: object
      properties:
        id:
          type: integer
        invoiceId:
          type: integer
        name:
          type: string
        description:
          type: string
        quantity:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        unitPrice:
          type: ["number", "null"]
        totalPrice:
          type: ["number", "null"]
      required:
        - id
        - invoiceId
        - name
        - description

    CreateInvoiceBody:
      type: object
      properties:
        invoiceNumber:
          type: ["string", "null"]
        supplier:
          type: string
        date:
          type: ["string", "null"]
        category:
          type: string
        totalAmount:
          type: ["number", "null"]
        imageBase64:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        buyer:
          type: ["string", "null"]
        createdBy:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateInvoiceItemBody"
      required:
        - supplier
        - category

    CreateInvoiceItemBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        quantity:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        unitPrice:
          type: ["number", "null"]
        totalPrice:
          type: ["number", "null"]
      required:
        - name
        - description

    UpdateInvoiceBody:
      type: object
      properties:
        invoiceNumber:
          type: ["string", "null"]
        supplier:
          type: string
        date:
          type: ["string", "null"]
        category:
          type: string
        totalAmount:
          type: ["number", "null"]
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        buyer:
          type: ["string", "null"]
        updatedBy:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateInvoiceItemBody"

    InvoiceSummary:
      type: object
      properties:
        totalInvoices:
          type: integer
        totalAmount:
          type: number
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategorySummary"
        bySupplier:
          type: array
          items:
            $ref: "#/components/schemas/SupplierSummary"
        byMonth:
          type: array
          items:
            $ref: "#/components/schemas/MonthSummary"
        recentInvoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
      required:
        - totalInvoices
        - totalAmount
        - byCategory
        - bySupplier
        - byMonth
        - recentInvoices

    MonthSummary:
      type: object
      properties:
        month:
          type: string
          description: "YYYY-MM"
        total:
          type: number
        count:
          type: integer
      required:
        - month
        - total
        - count

    CategorySummary:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
        total:
          type: number
      required:
        - category
        - count
        - total

    SupplierSummary:
      type: object
      properties:
        supplier:
          type: string
        count:
          type: integer
        total:
          type: number
      required:
        - supplier
        - count
        - total

    SupplierStats:
      type: object
      properties:
        supplier:
          type: string
        count:
          type: integer
        total:
          type: number
        firstDate:
          type: ["string", "null"]
        lastDate:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
      required:
        - supplier
        - count
        - total
        - categories

    ExportResponse:
      type: object
      properties:
        fileBase64:
          type: string
        filename:
          type: string
      required:
        - fileBase64
        - filename

    CheckDuplicateBody:
      type: object
      properties:
        imageBase64:
          type: ["string", "null"]
        supplier:
          type: ["string", "null"]
        invoiceNumber:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        totalAmount:
          type: ["number", "null"]
        excludeId:
          type: ["integer", "null"]

    DuplicateMatch:
      type: object
      properties:
        id:
          type: integer
        supplier:
          type: string
        invoiceNumber:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        totalAmount:
          type: ["number", "null"]
        createdAt:
          type: string
        matchType:
          type: string
          enum: [image, content]
      required:
        - id
        - supplier
        - createdAt
        - matchType

    CheckDuplicateResult:
      type: object
      properties:
        duplicates:
          type: array
          items:
            $ref: "#/components/schemas/DuplicateMatch"
      required:
        - duplicates

    ExtractInvoiceBody:
      type: object
      properties:
        imageBase64:
          type: string
      required:
        - imageBase64

    ExtractedInvoiceData:
      type: object
      properties:
        invoiceNumber:
          type: ["string", "null"]
        supplier:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        totalAmount:
          type: ["number", "null"]
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedInvoiceItem"
      required:
        - items

    AppNotification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        invoiceId:
          type: ["integer", "null"]
        invoiceSupplier:
          type: string
        actorName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - type
        - invoiceSupplier
        - createdAt

    ExtractedInvoiceItem:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        quantity:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
        unitPrice:
          type: ["number", "null"]
        totalPrice:
          type: ["number", "null"]
      required:
        - name
        - description

    UserRole:
      type: object
      required: [isAdmin]
      properties:
        isAdmin: { type: boolean }

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: ["integer", "null"]
        entityLabel:
          type: ["string", "null"]
        userId:
          type: string
        userEmail:
          type: ["string", "null"]
        userName:
          type: ["string", "null"]
        changes:
          type: ["object", "null"]
          additionalProperties: true
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:
          type: string
      required:
        - id
        - action
        - entityType
        - userId
        - createdAt

    AuditStats:
      type: object
      properties:
        totalEvents:
          type: integer
        last24h:
          type: integer
        last7d:
          type: integer
        last30d:
          type: integer
        byAction:
          type: array
          items:
            $ref: "#/components/schemas/AuditActionCount"
        byUser:
          type: array
          items:
            $ref: "#/components/schemas/AuditUserCount"
        byEntityType:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntityTypeCount"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/AuditDayCount"
      required:
        - totalEvents
        - last24h
        - last7d
        - last30d
        - byAction
        - byUser
        - byEntityType
        - recentActivity

    AuditActionCount:
      type: object
      properties:
        action: { type: string }
        count: { type: integer }
      required: [action, count]

    AuditUserCount:
      type: object
      properties:
        userId: { type: string }
        userName: { type: ["string", "null"] }
        userEmail: { type: ["string", "null"] }
        count: { type: integer }
      required: [userId, count]

    AuditEntityTypeCount:
      type: object
      properties:
        entityType: { type: string }
        count: { type: integer }
      required: [entityType, count]

    AuditDayCount:
      type: object
      properties:
        day: { type: string }
        count: { type: integer }
      required: [day, count]

    ValidateInvoiceBody:
      type: object
      properties:
        invoiceNumber:
          type: ["string", "null"]
        supplier:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        totalAmount:
          type: ["number", "null"]
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        buyer:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedInvoiceItem"
      required:
        - items
